<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | SCMXpertLite</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/css/login.css?v=forgot-password-20260611-1">
</head>

<body>
  <div class="auth-container">
    <div class="card">
      <div class="brand-row">
        <span class="brand-name">SCMXpertLite</span>
      </div>

      <div class="login-layout">
        <section class="card-body" aria-label="Login form">
          <h2 class="card-title">Welcome Back</h2>
          <p class="card-subtitle">Track shipments, devices, and users from one command center.</p>

          <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" maxlength="120" aria-describedby="email-error" required />
            <p id="email-error" class="field-error"></p>
          </div>
          <div class="form-group">
            <label for="password">PASSWORD</label>
            <div class="password-wrap">
              <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" aria-describedby="password-error" required />
              <button type="button" class="toggle-password" data-target="password" aria-label="Show password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <p id="password-caps-warning" class="capslock-warning" aria-live="polite">Caps Lock is ON</p>
            <p id="password-error" class="field-error"></p>
          </div>
          <div class="form-group captcha-group" id="captcha-group">
            <label>CAPTCHA</label>
            <div id="google-captcha" class="google-captcha"></div>
            <div id="local-captcha" class="local-captcha" hidden>
              <span id="captcha-question" class="captcha-question"></span>
              <button type="button" id="captcha-refresh" class="captcha-refresh" aria-label="Refresh CAPTCHA">
                <i class="fa-solid fa-rotate-right"></i>
              </button>
              <input type="text" id="captcha-answer" class="form-control" inputmode="numeric" autocomplete="off" placeholder="Answer" aria-describedby="captcha-error" />
            </div>
            <p id="captcha-error" class="field-error"></p>
          </div>

          <button id="submit-btn" type="submit" class="btn btn-primary">
            <i id="submit-icon" class="fa-solid fa-right-to-bracket"></i>
            <span id="submit-text">Log In</span>
          </button>
        </form>

        <button type="button" id="forgot-toggle" class="link-button">Forgot password?</button>

        <section id="forgot-panel" class="forgot-panel" hidden>
          <form id="forgotForm" novalidate>
            <div class="form-group">
              <label for="forgot-email">EMAIL</label>
              <input type="email" id="forgot-email" class="form-control" placeholder="you@example.com" autocomplete="email" maxlength="120" required />
            </div>
            <button id="forgot-submit" type="submit" class="btn btn-secondary">
              <i class="fa-solid fa-key"></i>
              <span>Get reset token</span>
            </button>
          </form>

          <form id="resetForm" novalidate>
            <div class="form-group">
              <label for="reset-email">EMAIL</label>
              <input type="email" id="reset-email" class="form-control" placeholder="you@example.com" autocomplete="email" maxlength="120" required />
            </div>
            <div class="form-group">
              <label for="reset-token">RESET TOKEN</label>
              <input type="text" id="reset-token" class="form-control" placeholder="Paste reset token" autocomplete="one-time-code" required />
            </div>
            <div class="form-group">
              <label for="reset-password">NEW PASSWORD</label>
              <div class="password-wrap">
                <input type="password" id="reset-password" class="form-control" placeholder="Create new password" autocomplete="new-password" required />
                <button type="button" class="toggle-password" data-target="reset-password" aria-label="Show new password">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="form-group">
              <label for="reset-confirm-password">CONFIRM PASSWORD</label>
              <div class="password-wrap">
                <input type="password" id="reset-confirm-password" class="form-control" placeholder="Confirm new password" autocomplete="new-password" required />
                <button type="button" class="toggle-password" data-target="reset-confirm-password" aria-label="Show confirmed password">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>
            <button id="reset-submit" type="submit" class="btn btn-primary">
              <i class="fa-solid fa-lock"></i>
              <span>Reset password</span>
            </button>
          </form>
        </section>

        <p class="signup-link">
          New here? <a href="/signup">Create account</a>
        </p>

        <div id="msg" class="message" aria-live="polite"></div>
        </section>

        <section class="login-art" aria-hidden="true">
          <div class="route-card route-card-one">
            <i class="fa-solid fa-microchip"></i>
          </div>
          <div class="route-card route-card-two">
            <i class="fa-solid fa-boxes-stacked"></i>
          </div>
          <div class="control-tower">
            <div class="tower-screen">
              <span></span><span></span><span></span>
              <strong></strong>
            </div>
            <div class="tower-base"></div>
          </div>
          <div class="route-arc"></div>
          <div class="truck-marker">
            <i class="fa-solid fa-truck-fast"></i>
          </div>
          <div class="route-dot dot-one"></div>
          <div class="route-dot dot-two"></div>
          <div class="route-dot dot-three"></div>
        </section>
      </div>
    </div>
  </div>
  <script src="/javascript/login.js?v=forgot-password-20260611-1"></script>
</body>

</html>
