<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In | SCMXpertLite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hermeneus+One&family=Cormorant+Garamond:wght@600&family=Rye&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link id="theme-stylesheet" rel="stylesheet" href="/css/login.css" data-light-href="/css/login.css" data-dark-href="/css/login-dark.css">
</head>

<body>
  <div class="auth-container">
    <div class="brand-row outside-brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <span class="brand-name">SCMXpertLite</span>
    </div>
    <div class="card">
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">Dark Mode</button>
      <div class="card-body">
        <h2 class="card-title">Welcome Back</h2>
        <p class="card-subtitle">Log in to continue to SCMXpertLite.</p>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">EMAIL</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" maxlength="120" aria-describedby="email-error" required />
            <p id="email-error" class="field-error"></p>
          </div>
          <div class="form-group">
            <label for="password">PASSWORD</label>
            <div class="password-wrap">
              <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" aria-describedby="password-error" required />
              <button type="button" class="toggle-password" data-target="password" aria-label="Show password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <p id="password-caps-warning" class="capslock-warning" aria-live="polite">Caps Lock is ON</p>
            <p id="password-error" class="field-error"></p>
          </div>

          <button id="submit-btn" type="submit" class="btn btn-primary">
            <i id="submit-icon" class="fa-solid fa-right-to-bracket"></i>
            <span id="submit-text">Log In</span>
          </button>
        </form>

        <p class="signup-link">
          New here? <a href="/signup">Create account</a>
        </p>

        <div id="msg" class="message" aria-live="polite"></div>
      </div>
    </div>
  </div>
  <script src="/javascript/theme-toggle.js"></script>
  <script src="/javascript/login.js"></script>
</body>

</html>
