<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Dashboard | SCMXpertLite</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/css/dashboard-base.css?v=profile-readable-20260609-1">
  <link rel="stylesheet" href="/css/dashboard.css?v=role-charts-20260609-1">
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand-row">
        <button type="button" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation"><i class="fa-solid fa-bars"></i></button>
        <button type="button" id="brand-home" class="brand-home" aria-label="Go to dashboard home">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-name">SCMXpertLite</span>
        </button>
      </div>
    </header>

    <div class="dashboard-layout">
      <aside class="side-nav" id="side-nav" aria-label="Dashboard navigation">
        <button type="button" class="nav-link active" data-section="overview"><i class="fa-solid fa-house"></i><span>Dashboard</span></button>
        <button type="button" class="nav-link user-only" data-section="shipments"><i class="fa-solid fa-boxes-stacked"></i><span>My Shipments</span></button>
        <button type="button" class="nav-link user-only" data-section="new-shipment"><i class="fa-solid fa-circle-plus"></i><span>New Shipment</span></button>
        <button type="button" class="nav-link user-only" data-section="notifications"><i class="fa-solid fa-bell"></i><span>Notifications</span></button>
        <button type="button" class="nav-link admin-only super-admin-only" data-section="users"><i class="fa-solid fa-users"></i><span>User Management</span></button>
        <button type="button" class="nav-link admin-only super-admin-only" data-section="operations"><i class="fa-solid fa-box-archive"></i><span>Shipments</span></button>
        <button type="button" class="nav-link admin-only super-admin-only" data-section="devices"><i class="fa-solid fa-microchip"></i><span>Devices</span></button>
        <button type="button" class="nav-link super-admin-only" data-section="health"><i class="fa-solid fa-shield-halved"></i><span>System Health</span></button>
        <button type="button" class="nav-link logout-link" id="sidebar-logout-btn"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></button>
      </aside>

      <main class="grid content-wrapper loading" id="content-wrapper">
        <section class="card welcome" data-view-section="overview">
          <h1>Dashboard</h1>
          <p>Verifying your role...</p>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="/javascript/dashboard.js?v=shipments-create-list-20260609-1"></script>
</body>
</html>
